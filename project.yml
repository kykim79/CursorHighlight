name: CursorHighlight
options:
  bundleIdPrefix: com.ktoy
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic

targets:
  CursorHighlight:
    type: application
    platform: macOS
    sources:
      - path: Sources/CursorHighlight
    info:
      path: Sources/CursorHighlight/Info.plist
      properties:
        LSUIElement: true
        NSAccessibilityUsageDescription: "마우스 클릭과 키보드 입력을 감지해 커서 강조 효과를 표시합니다."
        NSScreenCaptureUsageDescription: "돋보기 기능으로 커서 주변 화면을 실시간 확대 표시합니다."
        # MARKETING_VERSION/CURRENT_PROJECT_VERSION 빌드 설정에서 주입.
        # 로컬 빌드는 위 settings.base의 기본값(0.1.0/1), GitHub Actions는 git tag에서 추출한 값.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ktoy.CursorHighlight
        CODE_SIGN_ENTITLEMENTS: Sources/CursorHighlight/CursorHighlight.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Sources/CursorHighlight/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # GitHub Actions release workflow가 git tag에서 추출한 버전으로 override함.
        # 로컬 빌드 기본값 (workflow가 MARKETING_VERSION/CURRENT_PROJECT_VERSION 인자로 덮어씀).
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO

  # test host 없이 standalone test bundle — main app source를 직접 포함해 GUI 부담 없이
  # 순수 함수만 검증. main.swift는 entry point라 제외 (test bundle은 자체 entry 없이 XCTest runner 사용).
  CursorHighlightTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CursorHighlightTests
      - path: Sources/CursorHighlight
        excludes:
          - main.swift
          - Info.plist
          - CursorHighlight.entitlements
          - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ktoy.CursorHighlightTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  CursorHighlight:
    build:
      targets:
        CursorHighlight: all
        CursorHighlightTests: [test]
    run:
      config: Release
    test:
      config: Debug
      targets:
        - CursorHighlightTests
