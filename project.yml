name: Cluxo
options:
  bundleIdPrefix: com.ktoy
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"
  # 다국어: ko가 source language (코드의 hardcoded 한국어), en은 번역.
  developmentLanguage: ko

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    # 번역 누락 키를 fall back으로 base language(ko) 값 사용 — string interpolation fail 방지.
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

targets:
  Cluxo:
    type: application
    platform: macOS
    sources:
      - path: Sources/Cluxo
    info:
      path: Sources/Cluxo/Info.plist
      properties:
        LSUIElement: true
        NSAccessibilityUsageDescription: "마우스 클릭과 키보드 입력을 감지해 커서 강조 효과를 표시합니다."
        NSScreenCaptureUsageDescription: "돋보기 기능으로 커서 주변 화면을 실시간 확대 표시합니다."
        NSInputMonitoringUsageDescription: "전역 키보드 단축키(돋보기·스포트라이트·키스트로크 표시 토글 등)를 감지합니다."
        # MARKETING_VERSION/CURRENT_PROJECT_VERSION 빌드 설정에서 주입.
        # 로컬 빌드는 위 settings.base의 기본값(0.1.0/1), GitHub Actions는 git tag에서 추출한 값.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "Copyright © 2026 kykim79. MIT License."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ktoy.Cluxo
        CODE_SIGN_ENTITLEMENTS: Sources/Cluxo/Cluxo.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Sources/Cluxo/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # GitHub Actions release workflow가 git tag에서 추출한 버전으로 override함.
        # 로컬 빌드 기본값 (workflow가 MARKETING_VERSION/CURRENT_PROJECT_VERSION 인자로 덮어씀).
        MARKETING_VERSION: "1.1.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO

  # test host 없이 standalone test bundle — main app source를 직접 포함해 GUI 부담 없이
  # 순수 함수만 검증. main.swift는 entry point라 제외 (test bundle은 자체 entry 없이 XCTest runner 사용).
  CluxoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CluxoTests
      - path: Sources/Cluxo
        excludes:
          - main.swift
          - Info.plist
          - Cluxo.entitlements
          - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ktoy.CluxoTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Cluxo:
    build:
      targets:
        Cluxo: all
        CluxoTests: [test]
    run:
      config: Release
    test:
      config: Debug
      targets:
        - CluxoTests
